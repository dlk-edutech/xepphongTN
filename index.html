<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Chia Phòng</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background-color: #fff; 
            padding: 25px 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0;
        }
        .form-group { 
            margin-bottom: 20px; 
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="file"] { 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            padding: 12px 15px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
        }
        button:hover { 
            background-color: #218838; 
        }
        #thongBao { 
            margin-top: 15px; 
            text-align: center; 
            font-weight: bold; 
            color: #0056b3; 
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phần Mềm Chia Phòng Tối Ưu</h2>
    
    <div class="form-group">
        <label for="fileUpload">Chọn file Excel đầu vào:</label>
        <input type="file" id="fileUpload" accept=".xlsx, .xls" />
    </div>

    <button onclick="xuLyFile()">Xử lý và Tải xuống</button>
    <div id="thongBao"></div>
</div>

<script>
    function tinhDiemPhong(phong) {
        var tapM1 = new Set();
        var tapM2 = new Set();
        for(var i = 0; i < phong.length; i++) {
            tapM1.add(phong[i].m1);
            tapM2.add(phong[i].m2);
        }
        // Diem cang nho cang tot. Neu tat ca HS co cung M1 va cung M2 thi diem = 2
        return tapM1.size + tapM2.size;
    }

    function kiemTraPhongHoanHao(phong) {
        // Phong da full 24 va so mon dat muc toi thieu tuyet doi (la 2) thi khong can chinh sua them
        return phong.length === 24 && tinhDiemPhong(phong) <= 2;
    }

    function xuLyFile() {
        var fileInput = document.getElementById('fileUpload');
        var file = fileInput.files[0];
        var thongBao = document.getElementById('thongBao');
        
        if (!file) {
            alert("Vui lòng chọn file Excel!");
            return;
        }

        thongBao.innerText = "Đang quét 1.000.000 lần để tối ưu hóa dữ liệu (có thể mất vài giây)...";

        var reader = new FileReader();
        reader.onload = function(e) {
            // Su dung setTimeout de UI kip cap nhat trang thai dang xu ly
            setTimeout(function() {
                try {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, {type: 'array'});
                    var firstSheet = workbook.SheetNames[0];
                    var worksheet = workbook.Sheets[firstSheet];
                    var duLieu = XLSX.utils.sheet_to_json(worksheet);

                    if(duLieu.length === 0 || !("SBD" in duLieu[0]) || !("M1" in duLieu[0]) || !("M2" in duLieu[0])) {
                        alert("Lỗi: File Excel đầu vào phải chứa các cột có tiêu đề chính xác là 'SBD', 'M1', và 'M2'.");
                        thongBao.innerText = "";
                        return;
                    }

                    // Buoc 1: Dem tan suat va sap xep so bo de co trang thai khoi tao tot
                    var demMon = {};
                    for (var k = 0; k < duLieu.length; k++) {
                        var m1Str = String(duLieu[k].M1);
                        var m2Str = String(duLieu[k].M2);
                        if (!demMon[m1Str]) demMon[m1Str] = 0;
                        if (!demMon[m2Str]) demMon[m2Str] = 0;
                        demMon[m1Str]++; demMon[m2Str]++;
                    }

                    for (var j = 0; j < duLieu.length; j++) {
                        var valM1 = String(duLieu[j].M1);
                        var valM2 = String(duLieu[j].M2);
                        if (demMon[valM2] > demMon[valM1] || (demMon[valM2] === demMon[valM1] && valM2 < valM1)) {
                            var tam = duLieu[j].M1; duLieu[j].M1 = duLieu[j].M2; duLieu[j].M2 = tam;
                        }
                    }

                    duLieu.sort(function(a, b) {
                        var strA1 = String(a.M1), strB1 = String(b.M1);
                        var strA2 = String(a.M2), strB2 = String(b.M2);
                        if (demMon[strA1] !== demMon[strB1]) return demMon[strB1] - demMon[strA1]; 
                        if (strA1 < strB1) return -1; if (strA1 > strB1) return 1;
                        if (demMon[strA2] !== demMon[strB2]) return demMon[strB2] - demMon[strA2];
                        if (strA2 < strB2) return -1; if (strA2 > strB2) return 1;
                        return 0;
                    });

                    // Buoc 2: Khoi tao danh sach phong (Uu tien lap day 24 HS moi phong)
                    var tongSoHS = duLieu.length;
                    var soPhong = Math.ceil(tongSoHS / 24);
                    var danhSachPhong = [];
                    for(var i = 0; i < soPhong; i++) danhSachPhong.push([]);

                    var hsHienTai = 0;
                    for(var i = 0; i < soPhong; i++) {
                        // Phong cuoi cung se nhan so luong HS con du
                        var soLuongChia = (i < soPhong - 1) ? 24 : (tongSoHS - hsHienTai);
                        for(var j = 0; j < soLuongChia; j++) {
                            if(hsHienTai < tongSoHS) {
                                var d = duLieu[hsHienTai++];
                                danhSachPhong[i].push({ sbd: d.SBD, m1: d.M1, m2: d.M2 });
                            }
                        }
                    }

                    // Buoc 3: Mo phong vet can bang Local Search (Tang len 1.000.000 vong lap)
                    var tongChiPhi = 0;
                    for(var i = 0; i < soPhong; i++) tongChiPhi += tinhDiemPhong(danhSachPhong[i]);

                    var maxVongLap = 1000000;
                    for(var loop = 0; loop < maxVongLap; loop++) {
                        var loaiThaoTac = Math.floor(Math.random() * 3);

                        if(loaiThaoTac === 0) {
                            // Thao tac 1: Hoan doi M1 va M2 cua 1 HS
                            var p = Math.floor(Math.random() * soPhong);
                            // Bo qua neu phong trong hoac da dat trang thai hoan hao
                            if(danhSachPhong[p].length === 0 || kiemTraPhongHoanHao(danhSachPhong[p])) continue;
                            
                            var hsIdx = Math.floor(Math.random() * danhSachPhong[p].length);
                            var hsObj = danhSachPhong[p][hsIdx];

                            var diemCu = tinhDiemPhong(danhSachPhong[p]);
                            var mTam = hsObj.m1; hsObj.m1 = hsObj.m2; hsObj.m2 = mTam;
                            var diemMoi = tinhDiemPhong(danhSachPhong[p]);

                            if(diemMoi < diemCu || (diemMoi === diemCu && Math.random() < 0.1)) {
                                tongChiPhi += (diemMoi - diemCu);
                            } else {
                                mTam = hsObj.m1; hsObj.m1 = hsObj.m2; hsObj.m2 = mTam; // Hoan tac
                            }
                        } 
                        else if (loaiThaoTac === 1) {
                            // Thao tac 2: Chuyen 1 HS tu phong nay sang phong khac
                            var p1 = Math.floor(Math.random() * soPhong);
                            var p2 = Math.floor(Math.random() * soPhong);
                            if(p1 === p2 || danhSachPhong[p1].length <= 1 || danhSachPhong[p2].length >= 24) continue;
                            // Bo qua neu ca 2 phong deu da hoan hao (mac du p2 chua the hoan hao vi < 24)
                            if(kiemTraPhongHoanHao(danhSachPhong[p1])) continue;

                            var diemCu1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemCu2 = tinhDiemPhong(danhSachPhong[p2]);

                            var hsIdx = Math.floor(Math.random() * danhSachPhong[p1].length);
                            var hsDichChuyen = danhSachPhong[p1].splice(hsIdx, 1)[0];
                            danhSachPhong[p2].push(hsDichChuyen);

                            var diemMoi1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemMoi2 = tinhDiemPhong(danhSachPhong[p2]);
                            var delta = (diemMoi1 + diemMoi2) - (diemCu1 + diemCu2);

                            if(delta < 0 || (delta === 0 && Math.random() < 0.05)) {
                                tongChiPhi += delta;
                            } else {
                                // Hoan tac
                                danhSachPhong[p2].pop();
                                danhSachPhong[p1].splice(hsIdx, 0, hsDichChuyen);
                            }
                        }
                        else {
                            // Thao tac 3: Doi cho 2 HS o 2 phong
                            var p1 = Math.floor(Math.random() * soPhong);
                            var p2 = Math.floor(Math.random() * soPhong);
                            if(p1 === p2 || danhSachPhong[p1].length === 0 || danhSachPhong[p2].length === 0) continue;
                            // Bo qua neu 1 trong 2 phong da dat trang thai hoan hao
                            if(kiemTraPhongHoanHao(danhSachPhong[p1]) || kiemTraPhongHoanHao(danhSachPhong[p2])) continue;

                            var diemCu1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemCu2 = tinhDiemPhong(danhSachPhong[p2]);

                            var hs1 = Math.floor(Math.random() * danhSachPhong[p1].length);
                            var hs2 = Math.floor(Math.random() * danhSachPhong[p2].length);

                            var hsTam = danhSachPhong[p1][hs1];
                            danhSachPhong[p1][hs1] = danhSachPhong[p2][hs2];
                            danhSachPhong[p2][hs2] = hsTam;

                            var diemMoi1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemMoi2 = tinhDiemPhong(danhSachPhong[p2]);
                            var delta = (diemMoi1 + diemMoi2) - (diemCu1 + diemCu2);

                            if(delta < 0 || (delta === 0 && Math.random() < 0.05)) {
                                tongChiPhi += delta;
                            } else {
                                // Hoan tac
                                hsTam = danhSachPhong[p1][hs1];
                                danhSachPhong[p1][hs1] = danhSachPhong[p2][hs2];
                                danhSachPhong[p2][hs2] = hsTam;
                            }
                        }
                    }

                    // Buoc 4: Xuat du lieu sau khi toi uu
                    var duLieuDaXuLy = [];
                    for(var i = 0; i < soPhong; i++) {
                        for(var j = 0; j < danhSachPhong[i].length; j++) {
                            duLieuDaXuLy.push({
                                "SBD": danhSachPhong[i][j].sbd,
                                "M1": danhSachPhong[i][j].m1,
                                "M2": danhSachPhong[i][j].m2,
                                "Phòng": (i + 1)
                            });
                        }
                    }

                    var newWorksheet = XLSX.utils.json_to_sheet(duLieuDaXuLy);
                    var newWorkbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "DanhSachPhong");
                    XLSX.writeFile(newWorkbook, "KetQua_ChiaPhong_ToiUu.xlsx");
                    
                    thongBao.innerText = "Thuật toán tối ưu đã chạy xong! File đã được tải xuống.";
                } catch (error) {
                    alert("Đã xảy ra lỗi trong quá trình xử lý: " + error.message);
                    thongBao.innerText = "Xử lý thất bại.";
                }
            }, 50); // Delay 50ms de cap nhat UI
        };
        
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
