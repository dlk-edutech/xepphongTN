<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Chia Phòng</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background-color: #fff; 
            padding: 25px 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0;
        }
        .form-group { 
            margin-bottom: 20px; 
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="file"], input[type="number"] { 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            padding: 12px 15px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
        }
        button:hover { 
            background-color: #218838; 
        }
        #thongBao { 
            margin-top: 15px; 
            text-align: center; 
            font-weight: bold; 
            color: #0056b3; 
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phần Mềm Chia Phòng Tối Ưu</h2>
    
    <div class="form-group">
        <label for="fileUpload">Chọn file Excel đầu vào:</label>
        <input type="file" id="fileUpload" accept=".xlsx, .xls" />
    </div>

    <div class="form-group">
        <label for="soVongLap">Số lần quét thuật toán (vòng lặp):</label>
        <input type="number" id="soVongLap" value="5000000" />
    </div>

    <button onclick="xuLyFile()">Xử lý và Tải xuống</button>
    <div id="thongBao"></div>
</div>

<script>
    function tinhDiemPhong(phong) {
        var tapMon = new Set();
        for(var i = 0; i < phong.length; i++) {
            tapMon.add(phong[i].m1);
            tapMon.add(phong[i].m2);
        }
        return tapMon.size;
    }

    function kiemTraPhongHoanHao(phong) {
        return phong.length === 24 && tinhDiemPhong(phong) <= 2;
    }

    function xuLyFile() {
        var fileInput = document.getElementById('fileUpload');
        var file = fileInput.files[0];
        var thongBao = document.getElementById('thongBao');
        
        var soVongLapInput = document.getElementById('soVongLap').value;
        var maxVongLap = parseInt(soVongLapInput);
        if(isNaN(maxVongLap)) {
            maxVongLap = 5000000;
        }
        
        if (!file) {
            alert("Vui lòng chọn file Excel!");
            return;
        }

        thongBao.innerText = "Đang áp dụng Greedy Clustering & Simulated Annealing " + maxVongLap.toLocaleString('vi-VN') + " lần...";

        var reader = new FileReader();
        reader.onload = function(e) {
            setTimeout(function() {
                try {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, {type: 'array'});
                    var firstSheet = workbook.SheetNames[0];
                    var worksheet = workbook.Sheets[firstSheet];
                    var duLieu = XLSX.utils.sheet_to_json(worksheet);

                    if(duLieu.length === 0 || !("SBD" in duLieu[0]) || !("M1" in duLieu[0]) || !("M2" in duLieu[0])) {
                        alert("Lỗi: File Excel đầu vào phải chứa các cột có tiêu đề chính xác là 'SBD', 'M1', và 'M2'.");
                        thongBao.innerText = "";
                        return;
                    }

                    // Buoc 1: Chuan hoa va tao nhom
                    var gomNhom = {};
                    for (var j = 0; j < duLieu.length; j++) {
                        var valM1 = String(duLieu[j].M1);
                        var valM2 = String(duLieu[j].M2);
                        if (valM1 > valM2) {
                            var tam = valM1; valM1 = valM2; valM2 = tam;
                        }
                        var key = valM1 + "|" + valM2;
                        if (!gomNhom[key]) gomNhom[key] = [];
                        gomNhom[key].push({ sbd: duLieu[j].SBD, m1: valM1, m2: valM2 });
                    }

                    var mangNhom = [];
                    for (var key in gomNhom) {
                        mangNhom.push({
                            soLuong: gomNhom[key].length,
                            danhSach: gomNhom[key]
                        });
                    }

                    // Buoc 2: Greedy Clustering - Nhap nhom dua tren do giong nhau ve mon thi
                    var tongSoHS = duLieu.length;
                    var soPhong = Math.ceil(tongSoHS / 24);
                    var danhSachPhong = [];
                    for(var i = 0; i < soPhong; i++) danhSachPhong.push([]);

                    var tongDaXep = 0;
                    for(var i = 0; i < soPhong; i++) {
                        var sucChua = (i < soPhong - 1) ? 24 : (tongSoHS - tongDaXep);
                        var phongHienTai = danhSachPhong[i];
                        var monTrongPhong = new Set();

                        while(phongHienTai.length < sucChua && mangNhom.length > 0) {
                            var slotConLai = sucChua - phongHienTai.length;
                            var bestIndex = -1;
                            var minMonMoi = 999;
                            var bestKichThuoc = -999;

                            for(var k = 0; k < mangNhom.length; k++) {
                                var nhom = mangNhom[k];
                                var m1 = nhom.danhSach[0].m1;
                                var m2 = nhom.danhSach[0].m2;
                                var monMoi = 0;

                                if (phongHienTai.length > 0) {
                                    if (!monTrongPhong.has(m1)) monMoi++;
                                    if (!monTrongPhong.has(m2)) monMoi++;
                                }

                                var diemKichThuoc = 0;
                                if (nhom.soLuong === slotConLai) diemKichThuoc = 1000;
                                else if (nhom.soLuong < slotConLai) diemKichThuoc = nhom.soLuong;
                                else diemKichThuoc = slotConLai;

                                if (monMoi < minMonMoi) {
                                    minMonMoi = monMoi;
                                    bestKichThuoc = diemKichThuoc;
                                    bestIndex = k;
                                } else if (monMoi === minMonMoi) {
                                    if (diemKichThuoc > bestKichThuoc) {
                                        bestKichThuoc = diemKichThuoc;
                                        bestIndex = k;
                                    }
                                }
                            }

                            var nhomChon = mangNhom[bestIndex];
                            var soNguoiLay = Math.min(slotConLai, nhomChon.soLuong);

                            for(var step = 0; step < soNguoiLay; step++) {
                                var hs = nhomChon.danhSach.pop();
                                phongHienTai.push(hs);
                                monTrongPhong.add(hs.m1);
                                monTrongPhong.add(hs.m2);
                                tongDaXep++;
                            }
                            
                            nhomChon.soLuong -= soNguoiLay;
                            if(nhomChon.soLuong === 0) {
                                mangNhom.splice(bestIndex, 1);
                            }
                        }
                    }

                    // Buoc 3: Simulated Annealing
                    var tongChiPhi = 0;
                    for(var i = 0; i < soPhong; i++) tongChiPhi += tinhDiemPhong(danhSachPhong[i]);

                    var tHienTai = 1.0;
                    var tMin = 0.0001;
                    var alpha = maxVongLap > 0 ? Math.pow(tMin / tHienTai, 1.0 / maxVongLap) : 0;

                    for(var loop = 0; loop < maxVongLap; loop++) {
                        var loaiThaoTac = Math.floor(Math.random() * 3);
                        var delta = 0;

                        if(loaiThaoTac === 0) {
                            var p = Math.floor(Math.random() * soPhong);
                            if(danhSachPhong[p].length === 0 || kiemTraPhongHoanHao(danhSachPhong[p])) continue;
                            
                            var hsIdx = Math.floor(Math.random() * danhSachPhong[p].length);
                            var hsObj = danhSachPhong[p][hsIdx];

                            var diemCu = tinhDiemPhong(danhSachPhong[p]);
                            var mTam = hsObj.m1; hsObj.m1 = hsObj.m2; hsObj.m2 = mTam;
                            var diemMoi = tinhDiemPhong(danhSachPhong[p]);
                            delta = diemMoi - diemCu;

                            if(delta < 0 || (delta === 0 && Math.random() < 0.05)) {
                                tongChiPhi += delta;
                            } else {
                                var prob = Math.exp(-delta / tHienTai);
                                if (Math.random() < prob) {
                                    tongChiPhi += delta;
                                } else {
                                    mTam = hsObj.m1; hsObj.m1 = hsObj.m2; hsObj.m2 = mTam; 
                                }
                            }
                        } 
                        else if (loaiThaoTac === 1) {
                            var p1 = Math.floor(Math.random() * soPhong);
                            var p2 = Math.floor(Math.random() * soPhong);
                            if(p1 === p2 || danhSachPhong[p1].length <= 1 || danhSachPhong[p2].length >= 24) continue;
                            if(kiemTraPhongHoanHao(danhSachPhong[p1])) continue;

                            var diemCu1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemCu2 = tinhDiemPhong(danhSachPhong[p2]);

                            var hsIdx = Math.floor(Math.random() * danhSachPhong[p1].length);
                            var hsDichChuyen = danhSachPhong[p1].splice(hsIdx, 1)[0];
                            danhSachPhong[p2].push(hsDichChuyen);

                            var diemMoi1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemMoi2 = tinhDiemPhong(danhSachPhong[p2]);
                            delta = (diemMoi1 + diemMoi2) - (diemCu1 + diemCu2);

                            if(delta < 0 || (delta === 0 && Math.random() < 0.05)) {
                                tongChiPhi += delta;
                            } else {
                                var prob = Math.exp(-delta / tHienTai);
                                if (Math.random() < prob) {
                                    tongChiPhi += delta;
                                } else {
                                    danhSachPhong[p2].pop();
                                    danhSachPhong[p1].splice(hsIdx, 0, hsDichChuyen);
                                }
                            }
                        }
                        else {
                            var p1 = Math.floor(Math.random() * soPhong);
                            var p2 = Math.floor(Math.random() * soPhong);
                            if(p1 === p2 || danhSachPhong[p1].length === 0 || danhSachPhong[p2].length === 0) continue;
                            if(kiemTraPhongHoanHao(danhSachPhong[p1]) || kiemTraPhongHoanHao(danhSachPhong[p2])) continue;

                            var diemCu1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemCu2 = tinhDiemPhong(danhSachPhong[p2]);

                            var hs1 = Math.floor(Math.random() * danhSachPhong[p1].length);
                            var hs2 = Math.floor(Math.random() * danhSachPhong[p2].length);

                            var hsTam = danhSachPhong[p1][hs1];
                            danhSachPhong[p1][hs1] = danhSachPhong[p2][hs2];
                            danhSachPhong[p2][hs2] = hsTam;

                            var diemMoi1 = tinhDiemPhong(danhSachPhong[p1]);
                            var diemMoi2 = tinhDiemPhong(danhSachPhong[p2]);
                            delta = (diemMoi1 + diemMoi2) - (diemCu1 + diemCu2);

                            if(delta < 0 || (delta === 0 && Math.random() < 0.05)) {
                                tongChiPhi += delta;
                            } else {
                                var prob = Math.exp(-delta / tHienTai);
                                if (Math.random() < prob) {
                                    tongChiPhi += delta;
                                } else {
                                    hsTam = danhSachPhong[p1][hs1];
                                    danhSachPhong[p1][hs1] = danhSachPhong[p2][hs2];
                                    danhSachPhong[p2][hs2] = hsTam;
                                }
                            }
                        }
                        tHienTai *= alpha;
                    }

                    // Buoc 4: Sap xep va xuat file
                    var duLieuDaXuLy = [];
                    for(var i = 0; i < soPhong; i++) {
                        for(var j = 0; j < danhSachPhong[i].length; j++) {
                            duLieuDaXuLy.push({
                                "SBD": danhSachPhong[i][j].sbd,
                                "M1": danhSachPhong[i][j].m1,
                                "M2": danhSachPhong[i][j].m2,
                                "Phòng": (i + 1)
                            });
                        }
                    }

                    duLieuDaXuLy.sort(function(a, b) {
                        if (a["Phòng"] !== b["Phòng"]) {
                            return a["Phòng"] - b["Phòng"];
                        }
                        var sbdA = String(a["SBD"]);
                        var sbdB = String(b["SBD"]);
                        return sbdA.localeCompare(sbdB, undefined, {numeric: true, sensitivity: 'base'});
                    });

                    var newWorksheet = XLSX.utils.json_to_sheet(duLieuDaXuLy);
                    var newWorkbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "DanhSachPhong");
                    XLSX.writeFile(newWorkbook, "KetQua_ChiaPhong_ToiUu.xlsx");
                    
                    thongBao.innerText = "Đã hoàn tất thuật toán mạnh nhất! File đã được tải xuống.";
                } catch (error) {
                    alert("Đã xảy ra lỗi trong quá trình xử lý: " + error.message);
                    thongBao.innerText = "Xử lý thất bại.";
                }
            }, 50); 
        };
        
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
