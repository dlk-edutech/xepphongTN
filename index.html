<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ứng Dụng Chia Phòng</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f4f7f6; 
            padding: 30px; 
            display: flex; 
            justify-content: center; 
        }
        .container { 
            background-color: #fff; 
            padding: 25px 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 500px; 
        }
        h2 { 
            text-align: center; 
            color: #333; 
            margin-top: 0;
        }
        .form-group { 
            margin-bottom: 20px; 
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="file"] { 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        button { 
            padding: 12px 15px; 
            background-color: #28a745; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px; 
            font-weight: bold;
        }
        button:hover { 
            background-color: #218838; 
        }
        #thongBao { 
            margin-top: 15px; 
            text-align: center; 
            font-weight: bold; 
            color: #0056b3; 
            min-height: 24px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Phần Mềm Chia Phòng</h2>
    
    <div class="form-group">
        <label for="fileUpload">Chọn file Excel đầu vào:</label>
        <input type="file" id="fileUpload" accept=".xlsx, .xls" />
    </div>

    <button onclick="xuLyFile()">Xử lý và Tải xuống</button>
    <div id="thongBao"></div>
</div>

<script>
    function xuLyFile() {
        var fileInput = document.getElementById('fileUpload');
        var file = fileInput.files[0];
        var thongBao = document.getElementById('thongBao');
        
        if (!file) {
            alert("Vui lòng chọn file Excel!");
            return;
        }

        thongBao.innerText = "Đang xử lý...";

        var reader = new FileReader();
        reader.onload = function(e) {
            try {
                var data = new Uint8Array(e.target.result);
                var workbook = XLSX.read(data, {type: 'array'});
                var firstSheet = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheet];
                var duLieu = XLSX.utils.sheet_to_json(worksheet);

                // Kiem tra du lieu dau vao co dung format khong
                if(duLieu.length === 0 || !("SBD" in duLieu[0]) || !("M1" in duLieu[0]) || !("M2" in duLieu[0])) {
                    alert("Lỗi: File Excel đầu vào phải chứa các cột có tiêu đề chính xác là 'SBD', 'M1', và 'M2'.");
                    thongBao.innerText = "";
                    return;
                }

                // Buoc 1: Dem so luong xuat hien cua tung mon thi tren ca 2 cot
                var demMon = {};
                for (var k = 0; k < duLieu.length; k++) {
                    var m1Str = String(duLieu[k].M1);
                    var m2Str = String(duLieu[k].M2);
                    if (!demMon[m1Str]) demMon[m1Str] = 0;
                    if (!demMon[m2Str]) demMon[m2Str] = 0;
                    demMon[m1Str]++;
                    demMon[m2Str]++;
                }

                // Buoc 2: Chuan hoa du lieu - mon nao co so luong nhieu hon se nam o M1
                for (var j = 0; j < duLieu.length; j++) {
                    var valM1 = String(duLieu[j].M1);
                    var valM2 = String(duLieu[j].M2);
                    
                    // Neu M2 co so luong nhieu hon M1, hoac bang nhau nhung xep truoc theo bang chu cai
                    if (demMon[valM2] > demMon[valM1] || (demMon[valM2] === demMon[valM1] && valM2 < valM1)) {
                        var tam = duLieu[j].M1;
                        duLieu[j].M1 = duLieu[j].M2;
                        duLieu[j].M2 = tam;
                    }
                }

                // Buoc 3: Sap xep du lieu theo so luong mon thi (giam dan)
                duLieu.sort(function(a, b) {
                    var strA1 = String(a.M1);
                    var strB1 = String(b.M1);
                    var strA2 = String(a.M2);
                    var strB2 = String(b.M2);

                    // Uu tien sap xep theo so luong cua M1 truoc
                    if (demMon[strA1] !== demMon[strB1]) {
                        return demMon[strB1] - demMon[strA1]; 
                    }
                    
                    // Neu cung so luong, gom cac mon giong nhau lai de tranh bi roi rac
                    if (strA1 < strB1) return -1;
                    if (strA1 > strB1) return 1;

                    // Tiep tuc xet den so luong cua M2
                    if (demMon[strA2] !== demMon[strB2]) {
                        return demMon[strB2] - demMon[strA2];
                    }
                    
                    if (strA2 < strB2) return -1;
                    if (strA2 > strB2) return 1;

                    return 0;
                });

                var phongHienTai = 1;
                var soLuongTrongPhong = 0;
                var duLieuDaXuLy = [];

                // Tien hanh gan so phong, toi da 24 thi sinh / phong
                for (var i = 0; i < duLieu.length; i++) {
                    var dong = duLieu[i];
                    
                    duLieuDaXuLy.push({
                        "SBD": dong.SBD,
                        "M1": dong.M1,
                        "M2": dong.M2,
                        "Phòng": phongHienTai
                    });

                    soLuongTrongPhong++;
                    
                    if (soLuongTrongPhong === 24) {
                        phongHienTai++;
                        soLuongTrongPhong = 0;
                    }
                }

                // Tao file Excel moi de xuat ra
                var newWorksheet = XLSX.utils.json_to_sheet(duLieuDaXuLy);
                var newWorkbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "DanhSachPhong");
                
                // Tai xuong file ket qua
                XLSX.writeFile(newWorkbook, "KetQua_ChiaPhong.xlsx");
                
                thongBao.innerText = "Đã chia phòng và tải xuống thành công!";
            } catch (error) {
                alert("Đã xảy ra lỗi trong quá trình xử lý: " + error.message);
                thongBao.innerText = "Xử lý thất bại.";
            }
        };
        
        reader.readAsArrayBuffer(file);
    }
</script>

</body>
</html>
